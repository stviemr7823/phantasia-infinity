# PhantasiaDarkLaf.properties
# FlatLaf custom properties — the Phantasia dark fantasy palette.
# Registered via FlatLaf.registerCustomDefaultsSource("com.phantasia.editor")
# This file must be on the classpath under com/phantasia/editor/

# ─── Core Palette ──────────────────────────────────────────────────────
@background = #1A1A22
@foreground = #D7CDB9
@accentColor = #BFA34C
@disabledBackground = #1C1822
@disabledForeground = #5A5347

# ─── Component Focus ───────────────────────────────────────────────────
Component.focusWidth = 0
Component.innerFocusWidth = 1
Component.focusColor = #BFA34C80
Component.arc = 4
Component.borderColor = #373044
Component.disabledBorderColor = #2A2533

# ─── Buttons ───────────────────────────────────────────────────────────
Button.arc = 4
Button.background = #252230
Button.foreground = #D7CDB9
Button.hoverBackground = #302A3C
Button.pressedBackground = #3A3248
Button.borderColor = #373044
Button.hoverBorderColor = #BFA34C80
Button.focusedBorderColor = #BFA34C
Button.default.background = #352E1A
Button.default.foreground = #BFA34C
Button.default.hoverBackground = #40381E
Button.default.pressedBackground = #4A4022
Button.default.borderColor = #BFA34C80
Button.default.hoverBorderColor = #BFA34C
Button.default.focusedBorderColor = #BFA34C
Button.toolbar.hoverBackground = #302A3C

# ─── Text Fields ───────────────────────────────────────────────────────
TextField.background = #16161C
TextField.foreground = #D7CDB9
TextField.caretColor = #BFA34C
TextField.selectionBackground = #BFA34C40
TextField.selectionForeground = #D7CDB9
TextField.placeholderForeground = #5A5347
TextField.borderColor = #373044
TextField.focusedBorderColor = #BFA34C

TextArea.background = #16161C
TextArea.foreground = #D7CDB9

# ─── Combo Box ─────────────────────────────────────────────────────────
ComboBox.background = #16161C
ComboBox.buttonBackground = #252230
ComboBox.buttonEditableBackground = #252230
ComboBox.borderColor = #373044
ComboBox.focusedBorderColor = #BFA34C

# ─── Spinner ───────────────────────────────────────────────────────────
Spinner.background = #16161C
Spinner.buttonBackground = #252230
Spinner.borderColor = #373044
Spinner.focusedBorderColor = #BFA34C

# ─── Check Box / Radio ────────────────────────────────────────────────
CheckBox.icon.borderColor = #373044
CheckBox.icon.selectedBorderColor = #BFA34C
CheckBox.icon.background = #16161C
CheckBox.icon.selectedBackground = #BFA34C
CheckBox.icon.checkmarkColor = #1A1A22
CheckBox.icon.focusedBorderColor = #BFA34C
RadioButton.icon.borderColor = #373044
RadioButton.icon.selectedBorderColor = #BFA34C
RadioButton.icon.centerDiameter = 8

# ─── Panels ────────────────────────────────────────────────────────────
Panel.background = #1C1822

# ─── Tabbed Pane ───────────────────────────────────────────────────────
TabbedPane.background = #1A1A22
TabbedPane.focusColor = #BFA34C40
TabbedPane.contentAreaColor = #1C1822
TabbedPane.selectedBackground = #1C1822
TabbedPane.selectedForeground = #D7CDB9
TabbedPane.underlineColor = #BFA34C
TabbedPane.inactiveUnderlineColor = #373044
TabbedPane.hoverColor = #252230
TabbedPane.hoverForeground = #D7CDB9
TabbedPane.tabSeparatorColor = #37304400

# ─── Tree ──────────────────────────────────────────────────────────────
Tree.background = #16161C
Tree.foreground = #D7CDB9
Tree.selectionBackground = #BFA34C30
Tree.selectionForeground = #D7CDB9
Tree.selectionInactiveBackground = #BFA34C18
Tree.hash = #37304480
Tree.textForeground = #D7CDB9

# ─── List ──────────────────────────────────────────────────────────────
List.background = #16161C
List.foreground = #D7CDB9
List.selectionBackground = #BFA34C30
List.selectionForeground = #D7CDB9
List.selectionInactiveBackground = #BFA34C18

# ─── Table ─────────────────────────────────────────────────────────────
Table.background = #16161C
Table.foreground = #D7CDB9
Table.selectionBackground = #BFA34C30
Table.selectionForeground = #D7CDB9
Table.gridColor = #37304440

# ─── Scroll Bar ────────────────────────────────────────────────────────
ScrollBar.track = #1A1A22
ScrollBar.thumb = #373044
ScrollBar.hoverThumbColor = #4A4060
ScrollBar.pressedThumbColor = #BFA34C80
ScrollBar.width = 10
ScrollBar.thumbArc = 999
ScrollBar.thumbInsets = 2,2,2,2
ScrollBar.showButtons = false

# ─── Scroll Pane ───────────────────────────────────────────────────────
ScrollPane.background = #16161C
ScrollPane.borderColor = #373044

# ─── Split Pane ────────────────────────────────────────────────────────
SplitPane.background = #1A1A22
SplitPane.dividerSize = 5
SplitPaneDivider.draggingColor = #BFA34C60

# ─── Menu Bar ──────────────────────────────────────────────────────────
MenuBar.background = #15151C
MenuBar.foreground = #D7CDB9
MenuBar.hoverBackground = #BFA34C30
MenuBar.borderColor = #37304480
Menu.foreground = #D7CDB9
Menu.selectionBackground = #BFA34C30
Menu.selectionForeground = #D7CDB9

# ─── Menu Items ────────────────────────────────────────────────────────
MenuItem.foreground = #D7CDB9
MenuItem.selectionBackground = #BFA34C30
MenuItem.selectionForeground = #D7CDB9
MenuItem.acceleratorForeground = #8C8473
PopupMenu.background = #1C1822
PopupMenu.borderColor = #373044

# ─── Titled Border ─────────────────────────────────────────────────────
TitledBorder.titleColor = #BFA34C
TitledBorder.border = #373044

# ─── Separator ─────────────────────────────────────────────────────────
Separator.foreground = #37304480

# ─── Tool Tip ──────────────────────────────────────────────────────────
ToolTip.background = #252230
ToolTip.foreground = #D7CDB9
ToolTip.borderColor = #BFA34C60

# ─── Progress Bar ──────────────────────────────────────────────────────
ProgressBar.background = #252230
ProgressBar.foreground = #BFA34C
ProgressBar.selectionBackground = #1A1A22
ProgressBar.selectionForeground = #BFA34C

# ─── Option Pane ───────────────────────────────────────────────────────
OptionPane.background = #1C1822